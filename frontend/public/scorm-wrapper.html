<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SCORM Wrapper</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #ffffff;
        color: #1d2b24;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
      }
      .status {
        position: fixed;
        inset: 0 auto auto 0;
        padding: 0.4rem 0.6rem;
        border-radius: 0 0 10px 0;
        background: rgba(237, 244, 240, 0.95);
        border-right: 1px solid #c3d4cc;
        border-bottom: 1px solid #c3d4cc;
        font-size: 0.8rem;
        z-index: 10;
      }
      iframe {
        border: 0;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="status" class="status">Preparing wrapper...</div>
    <iframe id="scormFrame" src="about:blank" allow="fullscreen"></iframe>
    <script src="/scorm/lms-runtime-api.js"></script>
    <script src="/scorm/scorm-wrapper.js"></script>
  </body>
</html>
